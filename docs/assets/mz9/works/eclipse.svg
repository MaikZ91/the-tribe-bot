<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1250" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Éclipse — abstraktes Werk">
  <defs>
    <radialGradient id="ec-sky" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#23232a"/>
      <stop offset="55%" stop-color="#101013"/>
      <stop offset="100%" stop-color="#050506"/>
    </radialGradient>
    <radialGradient id="ec-orb" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#f4f2ec"/>
      <stop offset="42%" stop-color="#cfccc4"/>
      <stop offset="74%" stop-color="#6f6d68"/>
      <stop offset="100%" stop-color="#191a1d"/>
    </radialGradient>
    <radialGradient id="ec-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cdd2dc" stop-opacity=".5"/>
      <stop offset="60%" stop-color="#cdd2dc" stop-opacity="0"/>
    </radialGradient>
    <filter id="ec-grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <filter id="ec-soft" x="-30%" y="-200%" width="160%" height="500%"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>
  <rect width="1000" height="1250" fill="url(#ec-sky)"/>
  <g stroke="#ECEAE4" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="250" x2="1000" y2="250"/><line x1="0" y1="500" x2="1000" y2="500"/>
    <line x1="0" y1="760" x2="1000" y2="760"/><line x1="0" y1="1010" x2="1000" y2="1010"/>
  </g>
  <circle cx="500" cy="540" r="430" fill="url(#ec-halo)"/>
  <circle cx="500" cy="540" r="300" fill="url(#ec-orb)"/>
  <circle cx="500" cy="540" r="300" fill="none" stroke="#f4f2ec" stroke-opacity="0.16" stroke-width="1.5"/>
  <ellipse cx="500" cy="980" rx="330" ry="26" fill="#000" opacity="0.5" filter="url(#ec-soft)"/>
  <rect width="1000" height="1250" filter="url(#ec-grain)" opacity="0.05"/>
  <g fill="#ECEAE4" fill-opacity="0.62" font-family="Hanken Grotesk, sans-serif">
    <text x="64" y="1170" font-size="26" letter-spacing="2">Éclipse</text>
    <text x="64" y="1200" font-size="14" letter-spacing="5" opacity="0.7">MZ.9 — N°01</text>
  </g>
</svg>
