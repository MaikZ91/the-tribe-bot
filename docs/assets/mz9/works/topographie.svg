<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1250" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Topographie — abstraktes Werk">
  <defs>
    <linearGradient id="tp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4F2EC"/>
      <stop offset="100%" stop-color="#E2DFD7"/>
    </linearGradient>
    <linearGradient id="tp-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16161a" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#16161a" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#16161a" stop-opacity="0.85"/>
    </linearGradient>
    <path id="tp-line" d="M -40 0 C 180 -80 320 84 500 6 S 840 -92 1040 18" fill="none"/>
    <filter id="tp-grain"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>
  <rect width="1000" height="1250" fill="url(#tp-bg)"/>
  <g stroke="url(#tp-fade)" stroke-width="2" fill="none">
    <use href="#tp-line" transform="translate(0 140)"/>
    <use href="#tp-line" transform="translate(0 208) scale(1,1.06)"/>
    <use href="#tp-line" transform="translate(0 276)"/>
    <use href="#tp-line" transform="translate(0 344) scale(1,0.94)"/>
    <use href="#tp-line" transform="translate(0 412)"/>
    <use href="#tp-line" transform="translate(0 480) scale(1,1.08)"/>
    <use href="#tp-line" transform="translate(0 548)"/>
    <use href="#tp-line" transform="translate(0 616) scale(1,0.92)"/>
    <use href="#tp-line" transform="translate(0 684)"/>
    <use href="#tp-line" transform="translate(0 752) scale(1,1.05)"/>
    <use href="#tp-line" transform="translate(0 820)"/>
    <use href="#tp-line" transform="translate(0 888) scale(1,0.96)"/>
    <use href="#tp-line" transform="translate(0 956)"/>
    <use href="#tp-line" transform="translate(0 1024) scale(1,1.04)"/>
    <use href="#tp-line" transform="translate(0 1092)"/>
  </g>
  <circle cx="690" cy="470" r="6" fill="#16161a"/>
  <rect width="1000" height="1250" filter="url(#tp-grain)" opacity="0.06"/>
  <g fill="#16161a" fill-opacity="0.7" font-family="Hanken Grotesk, sans-serif">
    <text x="64" y="1172" font-size="26" letter-spacing="2">Topographie</text>
    <text x="64" y="1202" font-size="14" letter-spacing="5" opacity="0.65">MZ.9 — N°02</text>
