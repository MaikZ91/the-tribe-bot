<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1250" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Komposition — abstraktes Werk">
  <defs>
    <linearGradient id="kp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141519"/>
      <stop offset="100%" stop-color="#070708"/>
    </linearGradient>
    <linearGradient id="kp-half" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f4f2ec"/>
      <stop offset="100%" stop-color="#b9b6ad"/>
    </linearGradient>
    <clipPath id="kp-clip"><circle cx="500" cy="600" r="300"/></clipPath>
    <filter id="kp-grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>
  <rect width="1000" height="1250" fill="url(#kp-bg)"/>
  <g stroke="#ECEAE4" stroke-opacity="0.07" stroke-width="1">
    <line x1="200" y1="0" x2="200" y2="1250"/><line x1="500" y1="0" x2="500" y2="1250"/><line x1="800" y1="0" x2="800" y2="1250"/>
  </g>
  <circle cx="500" cy="600" r="300" fill="none" stroke="#ECEAE4" stroke-opacity="0.5" stroke-width="1.5"/>
  <g clip-path="url(#kp-clip)"><rect x="500" y="300" width="300" height="600" fill="url(#kp-half)"/></g>
  <rect x="476" y="180" width="48" height="840" fill="#ECEAE4" opacity="0.9"/>
  <circle cx="500" cy="600" r="14" fill="#070708"/>
  <g fill="#ECEAE4" fill-opacity="0.5">
    <circle cx="180" cy="1020" r="5"/><circle cx="240" cy="1020" r="5"/><circle cx="300" cy="1020" r="5"/>
  </g>
  <rect width="1000" height="1250" filter="url(#kp-grain)" opacity="0.05"/>
  <g fill="#ECEAE4" fill-opacity="0.6" font-family="Hanken Grotesk, sans-serif">
    <text x="64" y="1172" font-size="26" letter-spacing="2">Komposition</text>
    <text x="64" y="1202" font-size="14" letter-spacing="5" opacity="0.7">MZ.9 — N°04</text>
  </g>
