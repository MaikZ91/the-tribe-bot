<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gartengestaltung Bielefeld — Feldmann GmbH | Garten- &amp; Landschaftsbau</title>
<meta name="description" content="Feldmann GmbH — Ihr Experte für Gartengestaltung, Pflasterarbeiten und Pflanzungen in Bielefeld. Individuelle Gartenplanung seit 1985." />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#2D4A22" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%232D4A22'/><text x='16' y='22' font-family='serif' font-weight='bold' font-size='13' fill='%23C8A96E' text-anchor='middle'>F</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--wald:#2D4A22;--salbei:#7A9D54;--stein:#F4EDE4;--sandstein:#C8A96E;--dunkel:#1B3015;--weiss:#FFFCF8;--schwarz:#0F1A0C}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;color:var(--dunkel);line-height:1.68;background:var(--weiss);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block;height:auto}
::selection{background:var(--salbei);color:#fff}
.wrap{max-width:1120px;margin:0 auto;padding:0 clamp(20px,5vw,44px)}
h1,h2,h3{font-family:'Libre Baskerville',Georgia,serif;font-weight:700;line-height:1.12;letter-spacing:-.01em}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--salbei)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;font-weight:600;font-size:15px;padding:14px 30px;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:all .28s cubic-bezier(.22,.61,.36,1);white-space:nowrap}
.btn:hover{transform:translateY(-2px)}
.btn-prim{background:var(--wald);color:#fff;box-shadow:0 12px 28px -10px rgba(45,74,34,.45)}
.btn-prim:hover{background:var(--dunkel)}
.btn-sec{background:var(--sandstein);color:var(--dunkel);font-weight:700}
.btn-sec:hover{background:#B8994A}
.btn-ol{background:transparent;border:1.5px solid rgba(255,255,255,.45);color:#fff}
.btn-ol:hover{background:rgba(255,255,255,.08);border-color:var(--sandstein)}
.btn svg{width:18px;height:18px;flex:none}
.reveal{opacity:0;transform:translateY(22px);transition:opacity .75s cubic-bezier(.22,.61,.36,1),transform .75s}
.reveal.in{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none}}
</style>
</head>
<body>
<!-- NAV -->
<nav class="nav" id="nav">
<div class="wrap" style="display:flex;align-items:center;justify-content:space-between;padding-top:16px;padding-bottom:16px">
<a href="#top" class="brand" style="display:flex;align-items:center;gap:10px;font-family:'Libre Baskerville',serif;font-size:20px;font-weight:700;color:var(--wald)">
<span style="width:38px;height:38px;border-radius:50%;background:var(--wald);color:var(--sandstein);display:flex;align-items:center;justify-content:center;font-size:16px">🌿</span>Feldmann
</a>
<div style="display:flex;align-items:center;gap:24px">
<a href="#leistungen" style="font-size:14px;font-weight:600;color:var(--dunkel)">Leistungen</a>
<a href="#projekte" style="font-size:14px;font-weight:600;color:var(--dunkel)">Projekte</a>
<a href="#stimmen" style="font-size:14px;font-weight:600;color:var(--dunkel)">Referenzen</a>
<a href="#kontakt" class="btn btn-prim" style="padding:10px 22px;font-size:13px">Kontakt</a>
</div>
</div>
</nav>
