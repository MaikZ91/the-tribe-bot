<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MZ.9 — Lead-Vorschauen (Alt ↔ Neu)</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#0E1116" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E1116; --panel:#161B22; --panel-2:#1C232C; --card:#171D25;
    --ink:#E8ECF1; --ink-2:#9BA6B2; --ink-mut:#677083;
    --accent:#5E94D6; --green:#10B981; --amber:#E0A93B; --red:#E8765C;
    --line:rgba(232,236,241,.10); --line-2:rgba(232,236,241,.06);
    --maxw:1000px; --r:12px; --ease:cubic-bezier(.22,.61,.36,1);
    --sans:"Inter",system-ui,sans-serif; --mono:ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 clamp(14px,4vw,24px)}
  .top{padding:24px 0 4px}
  .top h1{font-size:clamp(1.4rem,3.5vw,1.85rem);font-weight:800;margin:0;letter-spacing:-.02em}
  .top p{margin:6px 0 0;color:var(--ink-2);font-size:14px}
  .top .meta{margin-top:12px;font-size:12.5px;color:var(--ink-mut);display:flex;gap:16px;flex-wrap:wrap}
  .top .meta b{color:var(--accent)}

  /* list view */
  .list{padding:18px 0 80px;display:flex;flex-direction:column;gap:8px}
  .row{background:var(--card);border:1px solid var(--line-2);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:14px;transition:border-color .2s}
  .row:hover{border-color:var(--line)}
  .row .info{flex:1;min-width:0}
  .row .nm{font-size:1.02rem;font-weight:700;line-height:1.2;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .heb{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:5px;white-space:nowrap}
  .heb.hoch{background:rgba(16,185,129,.16);color:var(--green)} .heb.mittel{background:rgba(224,169,59,.16);color:var(--amber)} .heb.niedrig{background:rgba(103,112,131,.18);color:var(--ink-mut)}
  .row .sub{margin-top:3px;font-size:12.5px;color:var(--ink-mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .score{flex:none;display:flex;flex-direction:column;align-items:center;justify-content:center;width:48px;height:48px;border-radius:10px;background:var(--panel-2);border:1px solid var(--line-2)}
  .score b{font-size:1.05rem;font-weight:800;line-height:1} .score span{font-size:8.5px;color:var(--ink-mut);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
  .score.lo b{color:var(--red)} .score.mid b{color:var(--amber)} .score.hi b{color:var(--green)}
  .row .acts{display:flex;gap:8px;flex:none}
  .det{display:none;grid-column:1/-1;width:100%;margin-top:4px;padding-top:14px;border-top:1px solid var(--line-2);gap:20px;grid-template-columns:1fr 1fr}
  .det.open{display:grid}
  .det h4{margin:0 0 8px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-mut)}
  .det ul{margin:0;padding:0;display:grid;gap:6px} .det li{list-style:none;display:flex;gap:8px;align-items:flex-start;font-size:13px;color:var(--ink-2)}
  .det.problems li::before{content:"–";color:var(--red);flex:none} .det.opps li::before{content:"+";color:var(--green);flex:none;font-weight:700}
  .det .col.p li::before{content:"–";color:var(--red);flex:none} .det .col.o li::before{content:"+";color:var(--green);font-weight:700;flex:none}
  .row.exp{flex-wrap:wrap}
  .toggle{flex:none;background:transparent;border:1px solid var(--line);color:var(--ink-mut);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:14px;transition:border-color .2s,color .2s}
  .toggle:hover{border-color:var(--accent);color:var(--accent)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;font-weight:700;font-size:13px;padding:10px 14px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:transform .15s,background .2s,border-color .2s;white-space:nowrap}
  .btn:hover{transform:translateY(-1px)} .btn svg{width:15px;height:15px;flex:none}
  .btn-pri{background:var(--accent);color:#fff} .btn-pri:hover{background:#4d83c5}
  .btn-sec{background:transparent;border-color:var(--line);color:var(--ink-2)} .btn-sec:hover{border-color:var(--accent);color:var(--accent)}
  .ghost{text-align:center;color:var(--ink-mut);font-size:12.5px;padding:14px 6px}
  @media (max-width:640px){
    .row{flex-wrap:wrap} .row .acts{width:100%;justify-content:flex-start} .btn{flex:1}
    .lbl{display:none}
  }

  /* split-view overlay */
  .split{position:fixed;inset:0;z-index:500;background:var(--bg);display:none;flex-direction:column}
  .split.open{display:flex}
  .split .bar{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:nowrap;overflow:hidden}
  .split .bar .ttl{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0} .split .bar .ttl small{color:var(--ink-mut);font-weight:500;margin-left:6px;font-size:11px}
  .split .bar .sp{flex:1;min-width:4px}
  .split .bar button{font-family:inherit;font-weight:600;font-size:12px;padding:6px 11px;border-radius:7px;border:1px solid var(--line);background:transparent;color:var(--ink);cursor:pointer;white-space:nowrap;flex:none}
  .split .bar button.x{background:var(--accent);color:#fff;border-color:transparent}
  .split .bar button:hover{border-color:var(--accent)}
  .panes{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0}
  .pane{display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--line)}
  .pane:last-child{border-right:0}
  .pane .lab{font-size:11.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:6px 12px;background:var(--panel-2);color:var(--amber);display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--amber)}
  .pane .lab::before{content:"";display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--amber);margin-right:7px;vertical-align:-1px}
  .pane .lab.neu{color:var(--green);border-bottom-color:var(--green)} .pane .lab.neu::before{background:var(--green)}
  .pane .lab a{color:var(--accent);font-size:11px;text-transform:none;letter-spacing:0;font-weight:700;margin-left:auto}
  .pane .lab a.liveopen{background:var(--accent);color:#fff;padding:4px 10px;border-radius:6px;font-weight:700}
  .pane .fr{flex:1;position:relative;background:#fff;min-height:0;overflow:auto}
  .pane iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#fff}
  .hint{position:absolute;left:0;right:0;bottom:0;z-index:3;background:rgba(22,27,34,.94);color:var(--ink-2);font-size:12px;text-align:center;padding:9px 12px}
  .hint a{color:var(--accent);font-weight:700}
  /* alt = scrollbarer Vollseiten-Screenshot (iframe-Einbettung der Fremdseite wird i.d.R. geblockt) */
  .shot{width:100%;display:block}
  .shotwrap{position:relative;min-height:100%}
  .loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--ink-mut);background:var(--panel);font-size:13px}
  .loading .sp{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .seg{display:none;gap:0;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{padding:7px 18px;font-size:13px;font-weight:800;background:transparent;color:var(--ink-2);border:0;cursor:pointer;text-transform:uppercase;letter-spacing:.04em}
  .seg button[data-pane="alt"].on{background:var(--amber);color:#1a1206}
  .seg button[data-pane="neu"].on{background:var(--green);color:#062a1d}
  @media (max-width:760px){
    .panes{grid-template-columns:1fr;grid-template-rows:1fr}
    .pane{border-right:0;border-bottom:1px solid var(--line);display:none}
    .pane.show{display:flex}
    .seg{display:flex}
  }
</style>
</head>
<body>
<header class="top">
  <div class="wrap">
    <h1>Lead-Vorschauen</h1>
    <p>Alt-Website und neue Konzept-Vorschau nebeneinander ansehen — und mit einem Klick die fertige E-Mail rausschicken.</p>
    <div class="meta" id="meta"></div>
  </div>
</header>
<main class="wrap"><div class="list" id="list"></div></main>

<!-- split-view overlay -->
<div class="split" id="split">
  <div class="bar">
    <div class="ttl" id="splitTtl"></div>
    <div class="seg" id="seg"><button data-pane="alt" class="on">Alt</button><button data-pane="neu">Neu</button></div>
    <div class="sp"></div>
    <button id="splitMail">✉ E-Mail</button>
    <button class="x" id="splitClose">✕</button>
  </div>
  <div class="panes">
    <div class="pane show" data-pane="alt">
      <div class="lab">Alt · aktuelle Website <a id="altLink" class="liveopen" href="#" target="_blank" rel="noopener">↗ Ganze Seite live öffnen</a></div>
      <div class="fr"><iframe id="altFrame" referrerpolicy="no-referrer"></iframe>
        <div class="hint" id="altHint">Lädt nicht? Manche Seiten verbieten die Einbettung — <a id="altHintLink" href="#" target="_blank" rel="noopener">hier ganze Seite live öffnen ↗</a></div>
      </div>
    </div>
    <div class="pane" data-pane="neu">
      <div class="lab neu">Neu · MZ.9 Konzept-Vorschau <a id="neuLink" href="#" target="_blank" rel="noopener">↗ Tab</a></div>
      <div class="fr"><iframe id="neuFrame"></iframe></div>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";
  /* ---- lead data (gepflegt vom MZ.9-Discovery-Lauf) ---- */
  var SEED=[
    {id:"physiofit",name:"Physiofit Bielefeld",industry:"Physiotherapie",hebel:"hoch",score:35,website:"https://www.physio-fit-bielefeld.de/",problems:["Veraltete Vorlage (~2015 Squarespace)","Keine Online-Terminbuchung","Kein CTA above the fold","Keine Trust-Signale"],opps:["Online-Terminbuchung 24/7","Google-Bewertungen prominent","WhatsApp- & Anruf-CTA above the fold"],preview:"https://maikz91.github.io/the-tribe-bot/leads/physiofit/"},
    {id:"physiowell",name:"Physiowell Bielefeld",industry:"Physiotherapie",hebel:"mittel",score:57,website:"https://www.physiowell-bielefeld.de/",problems:["Keine Online-Buchung (nur Formular)","Keine Bewertungen / Social Proof","Team ohne Fotos & Namen"],opps:["Echtzeit-Terminbuchung","Google-Reviews-Widget","Team-Sektion mit Credentials"],preview:"https://maikz91.github.io/the-tribe-bot/leads/physiowell/"},
    {id:"spuerbar",name:"SpürbarAnders",industry:"Physiotherapie",hebel:"niedrig",score:75,website:"https://spuerbaranders.eu/",problems:["Telefon-CTA erst below the fold","Keine Google-Bewertungen sichtbar"],opps:["Anruf-Button in den Hero","Reviews einbinden"],preview:"https://maikz91.github.io/the-tribe-bot/leads/spuerbar/"},
    {id:"kreuzkrug",name:"Restaurant Kreuzkrug",industry:"Gastronomie",hebel:"hoch",score:48,website:"https://www.kreuzkrug.de/",problems:["Veraltetes Design, kaum Bildwelt","Keine Bewertungen","Viele externe Weiterleitungen"],opps:["Inline-Reservierung statt Redirects","Foto-Galerie","Historie seit 1829 inszenieren"],preview:"https://maikz91.github.io/the-tribe-bot/leads/kreuzkrug/"},
    {id:"altbielefeld",name:"Restaurant Alt-Bielefeld",industry:"Gastronomie",hebel:"hoch",score:41,website:"https://www.alt-bielefeld.com/",problems:["Veraltetes WordPress-Template (~2015)","Speisekarte nur als PDF","Keine Online-Reservierung","Keine Reviews above the fold"],opps:["Online-Tischreservierung 24/7","Inline-Speisekarte statt PDF","Google-Reviews prominent"],preview:"https://maikz91.github.io/the-tribe-bot/leads/alt-bielefeld/"},
    {id:"strothmann",name:"Maler Strothmann",industry:"Handwerk",hebel:"mittel",score:59,website:"https://www.maler-strothmann.de/",problems:["Kein Angebots-/Kontaktformular","Keine Kundenstimmen","CTA-Hierarchie unklar"],opps:["Angebotsformular mit Foto-Upload","Referenzen & Bewertungen","Klare Angebot-CTAs"],preview:"https://maikz91.github.io/the-tribe-bot/leads/strothmann/"},
    {id:"schmitz",name:"Malermeister Schmitz",industry:"Handwerk",hebel:"mittel",score:59,website:"https://maler-hans-schmitz.de/",problems:["Kein Angebots-/Kontaktformular","Keine Kundenbewertungen","Leistungen ohne Preis-Orientierung"],opps:["Lead-Capture-Formular","Reviews & Referenzen","Leistungspakete mit Richtpreisen"],preview:"https://maikz91.github.io/the-tribe-bot/leads/schmitz/"},
    {id:"kanzlei-kotte",name:"Kanzlei Kotte",industry:"Kanzlei",hebel:"hoch",score:39,website:"https://www.kanzleikotte.de/",problems:["Template ~2010–2015","Kein Erstberatungsformular above the fold","Keine Mandantenbewertungen","Info-lastig statt conversion-orientiert"],opps:["Erstberatungs-Formular above the fold","Mandantenstimmen & Trust","Mobile-optimiertes Layout"],preview:"https://maikz91.github.io/the-tribe-bot/leads/kanzlei-kotte/"},

    {id:"zahnarzt-kahlke",name:"Zahnarztpraxis Dr. Kahlke",industry:"Zahnarzt",hebel:"hoch",score:44,website:"https://www.zahnarztpraxis-bielefeld.de/",problems:["Keine echte Online-Buchung (nur Rückruf)","Keine Google-Bewertungen","Dated 2010er-Template","Schwache primäre CTA"],opps:["Echte Online-Terminbuchung","Google-Reviews einbinden","Team-Sektion mit Fotos"],preview:"https://maikz91.github.io/the-tribe-bot/leads/zahnarzt-kahlke/"},
    {id:"dein-gym",name:"Dein Gym Bielefeld",industry:"Fitness",hebel:"mittel",score:55,website:"https://deingym-bielefeld.de/",problems:["Intransparente Preise","Kein Probetraining sichtbar","Keine Bewertungen","Kein Lead-Formular above the fold"],opps:["Transparente Preis-Tiers","Gratis-Probetraining als CTA","Reviews & Vorher-/Nachher"],preview:"https://maikz91.github.io/the-tribe-bot/leads/dein-gym/"},
    {id:"heise-immobilien",name:"Heise Immobilien",industry:"Immobilien",hebel:"hoch",score:36,website:"https://www.heise-immobilien.de/",problems:["Stark veraltet (.htm, Tabellen-Layout, ~10–15 J.)","Kein Lead-/Wertermittlungsformular above the fold","Keine Google-Bewertungen","Nicht mobil-optimiert"],opps:["Kostenlose Wertermittlung above the fold","Objekt-Listings modern inszenieren","Google-Reviews & Trust einbinden","Mobile-first Redesign"],preview:"https://maikz91.github.io/the-tribe-bot/leads/heise-immobilien/"},
    {id:"cafe-knigge",name:"Café Knigge",industry:"Gastronomie",hebel:"mittel",score:52,website:"https://cafe-knigge.de/",problems:["Dated Template (~frühe 2010er)","Speisekarte nur als PDF","Keine Google-Bewertungen","CTA erst below the fold"],opps:["Inline-Frühstückskarte statt PDF","Google-Reviews prominent","Torten-Galerie & Reservierung in den Hero"],preview:"https://maikz91.github.io/the-tribe-bot/leads/cafe-knigge/"},
    {id:"cafe-woelke",name:"Café Wölke",industry:"Gastronomie",hebel:"mittel",score:46,website:"https://cafe-woelke.de/",problems:["Veraltetes CMS (WorldSoft), dated Design","Keine Online-Torten-Anfrage/Bestellung","Keine Google-Bewertungen","Verschachtelte Navigation, CTA below the fold"],opps:["Online-Torten-Anfrage above the fold","Google-Reviews prominent","Torten-Galerie & klare Anlass-CTAs","Familien-USP (Spielplatz/Terrasse) inszenieren"],preview:"https://maikz91.github.io/the-tribe-bot/leads/cafe-woelke/"},
    {id:"optik-haertel",name:"Optik Haertel",industry:"Optiker",hebel:"mittel",score:48,website:"https://www.optik-haertel.de/",problems:["Dated Design, unklar ob responsive","Keine Online-Terminbuchung","Keine Google-Bewertungen","Schwache CTA, Standort erst nach langem Scroll"],opps:["Termin-Anfrage above the fold","Google-Reviews einbinden","Sehanalyse/Lupenbrillen-USP inszenieren","Sticky Kontakt-/Termin-Leiste"],preview:"https://maikz91.github.io/the-tribe-bot/leads/optik-haertel/"},
    {id:"buschkamp",name:"Am Buschkamp Immobilien",industry:"Immobilien",hebel:"niedrig",score:76,website:"https://am-buschkamp-immobilien.de/",problems:["Keine Objekt-Listings above the fold","Wertermittlung erst nach Scroll"],opps:["Featured-Objekte in den Hero","Wertermittlung above the fold"],preview:""},
    {id:"grossehelleforth",name:"Dres. Großehelleforth",industry:"Zahnarzt",hebel:"niedrig",score:69,website:"https://www.grossehelleforth.de/",problems:["Keine Google-Bewertungen auf Startseite","Kein Inline-Kontaktformular"],opps:["Reviews-Widget einbinden","Nutzenorientierte Headline"],preview:""}
  ];

  /* ---- echte Kontakt-E-Mails aus dem Impressum (sonst Fallback info@domain) ---- */
  var EMAILS={
    "physiofit":"info@physio-fit-bielefeld.de","physiowell":"info@physiowell-bielefeld.de",
    "kreuzkrug":"info@kreuzkrug.de","altbielefeld":"info@alt-bielefeld.de",
    "strothmann":"mail@maler-strothmann.de","schmitz":"maler-schmitz@t-online.de",
    "kanzlei-kotte":"info@kanzleikotte.de","zahnarzt-kahlke":"info@zahnarztpraxis-bielefeld.de",
    "dein-gym":"deingym.bielefeld@gmail.com","heise-immobilien":"info@heise-immobilien.de",
    "spuerbar":"info@spuerbaranders.eu","physiowell":"info@physiowell-bielefeld.de"
  };

  var built=SEED.filter(function(l){return l.preview;});
  function host(u){return u.replace(/^https?:\/\//,"").replace(/\/$/,"");}
  function byId(id){return SEED.filter(function(l){return l.id===id;})[0];}
  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]);});}

  /* ---- fertige E-Mail (mailto) ---- */
  function mailFor(l){
    var domain=host(l.website).replace(/^www\./,"").split("/")[0];
    var to=EMAILS[l.id]||("info@"+domain);
    var subject="Konzept-Vorschau für Ihre Website — "+l.name;
    var body=
"Hallo liebes "+l.name+"-Team,\n\n"+
"mein Name ist Maik, ich komme aus Bielefeld — und ehrlich gesagt mag ich, was Sie machen. Genau deshalb ist mir Ihre Website aufgefallen: Sie hat richtig Potenzial, kommt online aber noch nicht so rüber, wie Sie es vor Ort tun.\n\n"+
"Ich habe mir völlig unverbindlich die Freiheit genommen und eine moderne Vorschau gestaltet, wie Ihr Auftritt aussehen könnte — schauen Sie gern rein:\n\n"+
l.preview+"\n\n"+
"Im Vergleich zur aktuellen Seite ("+host(l.website)+") fällt mir vor allem auf, was sich mit wenig Aufwand spürbar verbessern lässt:\n"+
l.opps.map(function(o){return "• "+o;}).join("\n")+"\n\n"+
"Das Ganze ist kostenlos und ohne Hintergedanken — wenn es Ihnen gefällt, setze ich es gern für Sie um. Wenn nicht, behalten Sie einfach die Idee. :)\n\n"+
"Über eine kurze Rückmeldung würde ich mich sehr freuen.\n\n"+
"Herzliche Grüße\nMaik\nMZ.9 — Media Engineering.AI\n";
    return "mailto:"+encodeURIComponent(to)+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);
  }
  function sendMail(l){ window.location.href=mailFor(l); }

  /* ---- split view: beide live als iframe (schnell, volle Seite); alte Seite ggf. per Tab ---- */
  var split=document.getElementById("split"), curId=null;
  function openSplit(l){
    curId=l.id;
    document.getElementById("splitTtl").innerHTML=esc(l.name)+' <small>'+esc(l.industry)+' · '+esc(host(l.website))+'</small>';
    document.getElementById("altLink").href=l.website;
    document.getElementById("altHintLink").href=l.website;
    document.getElementById("neuLink").href=l.preview;
    document.getElementById("neuFrame").src=l.preview;
    document.getElementById("altFrame").src=l.website;
    split.classList.add("open"); document.body.style.overflow="hidden"; setPane("alt");
  }
  function closeSplit(){ split.classList.remove("open"); document.body.style.overflow="";
    document.getElementById("neuFrame").src="about:blank"; document.getElementById("altFrame").src="about:blank"; curId=null; }
  function setPane(p){
    document.querySelectorAll(".pane").forEach(function(el){el.classList.toggle("show",el.getAttribute("data-pane")===p);});
    document.querySelectorAll("#seg button").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-pane")===p);});
  }
  document.getElementById("splitClose").onclick=closeSplit;
  document.getElementById("splitMail").onclick=function(){ if(curId) sendMail(byId(curId)); };
  document.getElementById("seg").addEventListener("click",function(e){var b=e.target.closest("[data-pane]");if(b)setPane(b.getAttribute("data-pane"));});
  document.addEventListener("keydown",function(e){ if(e.key==="Escape" && split.classList.contains("open")) closeSplit(); });

  /* ---- render: Listen-Ansicht ---- */
  document.getElementById("meta").innerHTML=
    '<span><b>'+built.length+'</b> Vorschauen fertig</span><span><b>'+SEED.length+'</b> Leads gesamt</span><span>'+[...new Set(SEED.map(function(l){return l.industry;}))].length+' Branchen</span>';

  function scoreCls(n){ return n<45?"lo":n<65?"mid":"hi"; }
  var list=document.getElementById("list");
  list.innerHTML=built.map(function(l){
    var probs=(l.problems||[]).map(function(p){return '<li>'+esc(p)+'</li>';}).join("");
    var opps=(l.opps||[]).map(function(o){return '<li>'+esc(o)+'</li>';}).join("");
    return '<div class="row" data-id="'+l.id+'">'+
      '<div class="score '+scoreCls(l.score||0)+'" title="Audit-Score (0–100, niedriger = mehr Hebel)"><b>'+(l.score||0)+'</b><span>Score</span></div>'+
      '<div class="info"><div class="nm">'+esc(l.name)+'<span class="heb '+l.hebel+'">'+l.hebel+'</span></div>'+
        '<div class="sub">'+esc(l.industry)+' · '+esc(host(l.website))+'</div></div>'+
      '<button class="toggle" data-act="toggle" title="Bewertung / Schwachstellen">▾</button>'+
      '<div class="acts">'+
        '<button class="btn btn-pri" data-act="split"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="8" height="16" rx="1"/><rect x="13" y="4" width="8" height="16" rx="1"/></svg><span class="lbl">Alt ↔ Neu</span></button>'+
        '<button class="btn btn-sec" data-act="open" title="Neue Vorschau öffnen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg><span class="lbl">Vorschau</span></button>'+
        '<button class="btn btn-sec" data-act="mail" title="Fertige E-Mail öffnen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg><span class="lbl">E-Mail</span></button>'+
      '</div>'+
      '<div class="det"><div class="col p"><h4>Schwachstellen aktuell</h4><ul>'+probs+'</ul></div>'+
        '<div class="col o"><h4>Was die neue Vorschau verbessert</h4><ul>'+opps+'</ul></div></div>'+
    '</div>';
  }).join("");
  var unbuilt=SEED.length-built.length;
  if(unbuilt) list.innerHTML+='<div class="ghost">'+unbuilt+' weitere Leads ohne Vorschau (bereits moderne Seiten — geringer Hebel, bewusst nicht gebaut).</div>';

  list.addEventListener("click",function(e){
    var b=e.target.closest("[data-act]"); if(!b) return;
    var l=byId(b.closest(".row").getAttribute("data-id")); if(!l) return;
    var a=b.getAttribute("data-act");
    if(a==="toggle"){ var row=b.closest(".row"), det=row.querySelector(".det");
      var on=det.classList.toggle("open"); row.classList.toggle("exp",on); b.textContent=on?"▴":"▾"; return; }
    if(a==="split") openSplit(l);
    else if(a==="open") window.open(l.preview,"_blank","noopener");
    else if(a==="mail") sendMail(l);
  });
})();
</script>
</body>
</html>
