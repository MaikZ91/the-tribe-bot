<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MZ.9 — Lead-Vorschauen (Alt ↔ Neu)</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#0E1116" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230E1116'/><text x='16' y='22' font-family='Arial' font-weight='bold' font-size='14' fill='%235E94D6' text-anchor='middle'>M9</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E1116; --panel:#161B22; --panel-2:#1C232C; --card:#171D25;
    --ink:#E8ECF1; --ink-2:#9BA6B2; --ink-mut:#677083;
    --accent:#5E94D6; --green:#10B981; --amber:#E0A93B; --red:#E8765C;
    --line:rgba(232,236,241,.10); --line-2:rgba(232,236,241,.06);
    --maxw:1080px; --r:14px; --ease:cubic-bezier(.22,.61,.36,1);
    --sans:"Inter",system-ui,sans-serif; --mono:ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 clamp(16px,4vw,28px)}
  .top{padding:26px 0 6px}
  .top h1{font-size:clamp(1.5rem,3.5vw,2rem);font-weight:800;margin:0;letter-spacing:-.02em}
  .top p{margin:6px 0 0;color:var(--ink-2);font-size:14.5px}
  .top .meta{margin-top:14px;font-size:13px;color:var(--ink-mut);display:flex;gap:16px;flex-wrap:wrap}
  .top .meta b{color:var(--accent)}
  .grid{padding:22px 0 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
  .card{background:var(--card);border:1px solid var(--line-2);border-radius:var(--r);padding:20px;display:flex;flex-direction:column;gap:0;transition:border-color .2s,transform .2s}
  .card:hover{border-color:var(--line);transform:translateY(-2px)}
  .card .h{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .card .nm{font-size:1.15rem;font-weight:700;line-height:1.2}
  .card .sub{margin-top:3px;font-size:12.5px;color:var(--ink-mut)}
  .heb{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 8px;border-radius:6px;white-space:nowrap;flex:none}
  .heb.hoch{background:rgba(16,185,129,.16);color:var(--green)} .heb.mittel{background:rgba(224,169,59,.16);color:var(--amber)} .heb.niedrig{background:rgba(103,112,131,.18);color:var(--ink-mut)}
  .why{margin:14px 0 0;font-size:13.5px;color:var(--ink-2);display:grid;gap:6px}
  .why li{list-style:none;display:flex;gap:8px;align-items:flex-start}
  .why li::before{content:"→";color:var(--accent);flex:none}
  .acts{margin-top:18px;display:grid;gap:9px}
  .btn{display:flex;align-items:center;justify-content:center;gap:9px;font-family:inherit;font-weight:700;font-size:14px;padding:13px 16px;border-radius:9px;cursor:pointer;border:1px solid transparent;transition:transform .2s,background .2s,border-color .2s;width:100%}
  .btn:hover{transform:translateY(-1px)} .btn svg{width:16px;height:16px;flex:none}
  .btn-pri{background:var(--accent);color:#fff} .btn-pri:hover{background:#4d83c5}
  .btn-sec{background:transparent;border-color:var(--line);color:var(--ink)} .btn-sec:hover{border-color:var(--accent);color:var(--accent)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .ghost{grid-column:1/-1;text-align:center;color:var(--ink-mut);font-size:12.5px;padding:6px}
  .ghost a{color:var(--accent);text-decoration:underline}

  /* split-view overlay */
  .split{position:fixed;inset:0;z-index:500;background:var(--bg);display:none;flex-direction:column}
  .split.open{display:flex}
  .split .bar{display:flex;align-items:center;gap:14px;padding:11px clamp(12px,3vw,20px);background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
  .split .bar .ttl{font-weight:700;font-size:15px} .split .bar .ttl small{color:var(--ink-mut);font-weight:500;margin-left:8px;font-size:12.5px}
  .split .bar .sp{flex:1}
  .split .bar button{font-family:inherit;font-weight:600;font-size:13px;padding:8px 14px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--ink);cursor:pointer}
  .split .bar button.x{background:var(--accent);color:#fff;border-color:transparent}
  .split .bar button:hover{border-color:var(--accent)}
  .panes{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0}
  .pane{display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--line)}
  .pane:last-child{border-right:0}
  .pane .lab{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:7px 12px;background:var(--panel-2);color:var(--ink-2);display:flex;justify-content:space-between;align-items:center}
  .pane .lab.neu{color:var(--green)} .pane .lab a{color:var(--accent);font-size:11px;text-transform:none;letter-spacing:0}
  .pane .fr{flex:1;position:relative;background:#fff;min-height:0}
  .pane iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#fff}
  .pane .fallback{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--panel);color:var(--ink-2);text-align:center;padding:24px;font-size:14px}
  .pane .fallback a{background:var(--accent);color:#fff;padding:11px 18px;border-radius:8px;font-weight:700}
  .seg{display:none;gap:1px;background:var(--line);border-radius:8px;overflow:hidden}
  .seg button{padding:8px 14px;font-size:13px}
  @media (max-width:760px){
    .panes{grid-template-columns:1fr;grid-template-rows:1fr}
    .pane{border-right:0;border-bottom:1px solid var(--line);display:none}
    .pane.show{display:flex}
    .seg{display:flex}
  }
</style>
</head>
<body>
<header class="top">
  <div class="wrap">
    <h1>Lead-Vorschauen</h1>
    <p>Alt-Website und neue Konzept-Vorschau nebeneinander ansehen — und mit einem Klick die fertige E-Mail rausschicken.</p>
    <div class="meta" id="meta"></div>
  </div>
</header>
<main class="wrap"><div class="grid" id="grid"></div></main>

<!-- split-view overlay -->
<div class="split" id="split">
  <div class="bar">
    <div class="ttl" id="splitTtl"></div>
    <div class="seg" id="seg"><button data-pane="alt" class="on">Alt</button><button data-pane="neu">Neu</button></div>
    <div class="sp"></div>
    <button id="splitMail">✉ E-Mail rausschicken</button>
    <button class="x" id="splitClose">Schließen ✕</button>
  </div>
  <div class="panes">
    <div class="pane show" data-pane="alt">
      <div class="lab">Alt · aktuelle Website <a id="altLink" href="#" target="_blank" rel="noopener">↗ Tab</a></div>
      <div class="fr"><iframe id="altFrame" referrerpolicy="no-referrer"></iframe>
        <div class="fallback" id="altFallback"><div>Diese Website erlaubt keine Einbettung.</div><a id="altOpen" href="#" target="_blank" rel="noopener">Alt-Website im neuen Tab öffnen ↗</a></div>
      </div>
    </div>
    <div class="pane" data-pane="neu">
      <div class="lab neu">Neu · MZ.9 Konzept-Vorschau <a id="neuLink" href="#" target="_blank" rel="noopener">↗ Tab</a></div>
      <div class="fr"><iframe id="neuFrame"></iframe></div>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var DIMS=["design","ux","seo","conversion","trust","performance"];
  /* ---- lead data (gepflegt vom MZ.9-Discovery-Lauf) ---- */
  var SEED=[
    {id:"physiofit",name:"Physiofit Bielefeld",industry:"Physiotherapie",hebel:"hoch",website:"https://www.physio-fit-bielefeld.de/",opps:["Online-Terminbuchung 24/7","Google-Bewertungen prominent","WhatsApp- & Anruf-CTA above the fold"],preview:"https://maikz91.github.io/the-tribe-bot/leads/physiofit/"},
    {id:"physiowell",name:"Physiowell Bielefeld",industry:"Physiotherapie",hebel:"mittel",website:"https://www.physiowell-bielefeld.de/",opps:["Echtzeit-Terminbuchung","Google-Reviews-Widget","Team-Sektion mit Credentials"],preview:"https://maikz91.github.io/the-tribe-bot/leads/physiowell/"},
    {id:"spuerbar",name:"SpürbarAnders",industry:"Physiotherapie",hebel:"niedrig",website:"https://spuerbaranders.eu/",opps:["Anruf-Button in den Hero","Reviews einbinden"],preview:"https://maikz91.github.io/the-tribe-bot/leads/spuerbar/"},
    {id:"kreuzkrug",name:"Restaurant Kreuzkrug",industry:"Gastronomie",hebel:"hoch",website:"https://www.kreuzkrug.de/",opps:["Inline-Reservierung statt Redirects","Foto-Galerie","Historie seit 1829 inszenieren"],preview:"https://maikz91.github.io/the-tribe-bot/leads/kreuzkrug/"},
    {id:"altbielefeld",name:"Restaurant Alt-Bielefeld",industry:"Gastronomie",hebel:"hoch",website:"https://www.alt-bielefeld.com/",opps:["Online-Tischreservierung 24/7","Inline-Speisekarte statt PDF","Google-Reviews prominent"],preview:"https://maikz91.github.io/the-tribe-bot/leads/alt-bielefeld/"},
    {id:"strothmann",name:"Maler Strothmann",industry:"Handwerk",hebel:"mittel",website:"https://www.maler-strothmann.de/",opps:["Angebotsformular mit Foto-Upload","Referenzen & Bewertungen","Klare Angebot-CTAs"],preview:"https://maikz91.github.io/the-tribe-bot/leads/strothmann/"},
    {id:"schmitz",name:"Malermeister Schmitz",industry:"Handwerk",hebel:"mittel",website:"https://maler-hans-schmitz.de/",opps:["Lead-Capture-Formular","Reviews & Referenzen","Leistungspakete mit Richtpreisen"],preview:"https://maikz91.github.io/the-tribe-bot/leads/schmitz/"},
    {id:"kanzlei-kotte",name:"Kanzlei Kotte",industry:"Kanzlei",hebel:"hoch",website:"https://www.kanzleikotte.de/",opps:["Erstberatungs-Formular above the fold","Mandantenstimmen & Trust","Mobile-optimiertes Layout"],preview:"https://maikz91.github.io/the-tribe-bot/leads/kanzlei-kotte/"},
    {id:"cicco-friseur",name:"Cicco Friseur",industry:"Friseur",hebel:"mittel",website:"https://cicco-friseur.de/",opps:["Google-Reviews prominent","Inline-Preisliste","Galerie & Online-Reservierung"],preview:"https://maikz91.github.io/the-tribe-bot/leads/cicco-friseur/"},
    {id:"zahnarzt-kahlke",name:"Zahnarztpraxis Dr. Kahlke",industry:"Zahnarzt",hebel:"hoch",website:"https://www.zahnarztpraxis-bielefeld.de/",opps:["Echte Online-Terminbuchung","Google-Reviews einbinden","Team-Sektion mit Fotos"],preview:"https://maikz91.github.io/the-tribe-bot/leads/zahnarzt-kahlke/"},
    {id:"dein-gym",name:"Dein Gym Bielefeld",industry:"Fitness",hebel:"mittel",website:"https://deingym-bielefeld.de/",opps:["Transparente Preis-Tiers","Gratis-Probetraining als CTA","Reviews & Vorher-/Nachher"],preview:"https://maikz91.github.io/the-tribe-bot/leads/dein-gym/"},
    {id:"buschkamp",name:"Am Buschkamp Immobilien",industry:"Immobilien",hebel:"niedrig",website:"https://am-buschkamp-immobilien.de/",opps:["Featured-Objekte in den Hero","Wertermittlung above the fold"],preview:""},
    {id:"grossehelleforth",name:"Dres. Großehelleforth",industry:"Zahnarzt",hebel:"niedrig",website:"https://www.grossehelleforth.de/",opps:["Reviews-Widget einbinden","Nutzenorientierte Headline"],preview:""}
  ];

  var built=SEED.filter(function(l){return l.preview;});
  function host(u){return u.replace(/^https?:\/\//,"").replace(/\/$/,"");}
  function byId(id){return SEED.filter(function(l){return l.id===id;})[0];}

  /* ---- fertige E-Mail (mailto) ---- */
  function mailFor(l){
    var domain=host(l.website).replace(/^www\./,"").split("/")[0];
    var to="info@"+domain;
    var subject="Konzept-Vorschau für Ihre Website — "+l.name;
    var body=
"Guten Tag,\n\n"+
"ich habe mir die Website von "+l.name+" angesehen und unverbindlich eine moderne Konzept-Vorschau gestaltet, wie der Auftritt aussehen könnte:\n\n"+
l.preview+"\n\n"+
"Im direkten Vergleich zur aktuellen Seite ("+host(l.website)+") fallen vor allem diese Punkte auf, die sich leicht verbessern lassen:\n"+
l.opps.map(function(o){return "• "+o;}).join("\n")+"\n\n"+
"Die Vorschau ist komplett kostenlos und unverbindlich — schauen Sie gern hinein. Wenn es Ihnen gefällt, setze ich es gern für Sie um.\n\n"+
"Beste Grüße\n"+
"MZ.9 — Media Engineering.AI\n";
    return "mailto:"+encodeURIComponent(to)+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);
  }
  function sendMail(l){ window.location.href=mailFor(l); }

  /* ---- split view ---- */
  var split=document.getElementById("split"), curId=null;
  function openSplit(l){
    curId=l.id;
    document.getElementById("splitTtl").innerHTML=l.name+' <small>'+l.industry+' · '+host(l.website)+'</small>';
    var alt=document.getElementById("altFrame"), neu=document.getElementById("neuFrame"), fb=document.getElementById("altFallback");
    fb.style.display="none";
    alt.src=l.website; neu.src=l.preview;
    document.getElementById("altLink").href=l.website; document.getElementById("altOpen").href=l.website;
    document.getElementById("neuLink").href=l.preview;
    // viele Seiten blocken Einbettung (X-Frame-Options): nach kurzer Zeit Fallback zeigen
    var loaded=false; alt.onload=function(){loaded=true;};
    setTimeout(function(){ if(!loaded) fb.style.display="flex"; },2500);
    split.classList.add("open"); document.body.style.overflow="hidden";
    setPane("alt");
  }
  function closeSplit(){ split.classList.remove("open"); document.body.style.overflow="";
    document.getElementById("altFrame").src="about:blank"; document.getElementById("neuFrame").src="about:blank"; curId=null; }
  function setPane(p){ // nur mobil relevant
    document.querySelectorAll(".pane").forEach(function(el){el.classList.toggle("show",el.getAttribute("data-pane")===p);});
    document.querySelectorAll("#seg button").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-pane")===p);});
  }
  document.getElementById("splitClose").onclick=closeSplit;
  document.getElementById("splitMail").onclick=function(){ if(curId) sendMail(byId(curId)); };
  document.getElementById("seg").addEventListener("click",function(e){var b=e.target.closest("[data-pane]");if(b)setPane(b.getAttribute("data-pane"));});
  document.addEventListener("keydown",function(e){ if(e.key==="Escape") closeSplit(); });

  /* ---- render ---- */
  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]);});}
  document.getElementById("meta").innerHTML=
    '<span><b>'+built.length+'</b> Vorschauen fertig</span><span><b>'+SEED.length+'</b> Leads gesamt</span><span>Branchen: '+[...new Set(SEED.map(function(l){return l.industry;}))].length+'</span>';

  var grid=document.getElementById("grid");
  grid.innerHTML=built.map(function(l){
    return '<div class="card" data-id="'+l.id+'">'+
      '<div class="h"><div><div class="nm">'+esc(l.name)+'</div><div class="sub">'+esc(l.industry)+' · '+esc(host(l.website))+'</div></div>'+
        '<span class="heb '+l.hebel+'">'+l.hebel+'</span></div>'+
      '<ul class="why">'+l.opps.slice(0,3).map(function(o){return '<li>'+esc(o)+'</li>';}).join("")+'</ul>'+
      '<div class="acts">'+
        '<button class="btn btn-pri" data-act="split"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="8" height="16" rx="1"/><rect x="13" y="4" width="8" height="16" rx="1"/></svg>Alt ↔ Neu ansehen</button>'+
        '<div class="row2">'+
          '<button class="btn btn-sec" data-act="open"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>Vorschau</button>'+
          '<button class="btn btn-sec" data-act="mail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>E-Mail</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join("");
  var unbuilt=SEED.length-built.length;
  if(unbuilt) grid.innerHTML+='<div class="ghost">'+unbuilt+' weitere Leads ohne Vorschau (bereits moderne Seiten — geringer Hebel, bewusst nicht gebaut).</div>';

  grid.addEventListener("click",function(e){
    var b=e.target.closest("[data-act]"); if(!b) return;
    var l=byId(b.closest(".card").getAttribute("data-id")); if(!l) return;
    var a=b.getAttribute("data-act");
    if(a==="split") openSplit(l);
    else if(a==="open") window.open(l.preview,"_blank","noopener");
    else if(a==="mail") sendMail(l);
  });
})();
</script>
</body>
</html>
