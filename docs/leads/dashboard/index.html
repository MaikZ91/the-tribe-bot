<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MZ.9 · Audit Intelligence — Lead Queue</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#0B0C10" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230B0C10'/><circle cx='16' cy='16' r='7' fill='none' stroke='%2310b981' stroke-width='2'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0C10; --bg-2:#101218; --panel:#15171F; --panel-2:#1B1E27; --raise:#222633;
    --ink:#E9EAEE; --ink-2:#A6A9B4; --ink-mut:#6C6F7C;
    --line:rgba(233,234,238,.10); --line-2:rgba(233,234,238,.06);
    --green:#10B981; --green-d:#0E9D6E; --amber:#E0A93B; --red:#E8765C; --blue:#5E94D6;
    --sans:"IBM Plex Sans",-apple-system,system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
    --r:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  button{font-family:inherit;cursor:pointer}
  ::selection{background:var(--green);color:#04130d}
  .mono{font-family:var(--mono)}
  :focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:4px}

  /* top bar */
  .top{position:sticky;top:0;z-index:30;background:rgba(11,12,16,.86);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);padding:14px clamp(16px,3vw,28px);display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .brand .mk{width:38px;height:38px;border-radius:10px;background:var(--panel-2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex:none}
  .brand .mk svg{width:20px;height:20px}
  .brand .tt{font-size:15px;font-weight:600;letter-spacing:.01em;display:flex;align-items:center;gap:8px}
  .brand .badge{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--green);
    border:1px solid rgba(16,185,129,.4);border-radius:20px;padding:2px 8px}
  .brand .sb{font-size:11.5px;color:var(--ink-mut);margin-top:1px}
  .top .sp{flex:1}
  .top .actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);
    padding:9px 14px;border-radius:9px;transition:background .2s,border-color .2s,transform .2s}
  .btn:hover{background:var(--raise);transform:translateY(-1px)}
  .btn.green{background:var(--green);color:#04130d;border-color:var(--green)}
  .btn.green:hover{background:var(--green-d)}
  .btn svg{width:15px;height:15px}

  /* KPI row */
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:clamp(16px,3vw,24px) clamp(16px,3vw,28px) 4px}
  .kpi{background:var(--panel);border:1px solid var(--line-2);border-radius:var(--r);padding:16px 18px}
  .kpi .v{font-family:var(--mono);font-size:1.9rem;font-weight:500;line-height:1}
  .kpi .l{font-size:11.5px;color:var(--ink-mut);margin-top:7px;letter-spacing:.02em}
  .kpi.accent .v{color:var(--green)}

  /* toolbar */
  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:18px clamp(16px,3vw,28px) 10px}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-size:12.5px;font-weight:600;color:var(--ink-2);background:var(--panel-2);border:1px solid var(--line);padding:7px 13px;border-radius:20px;transition:all .2s}
  .chip:hover{color:var(--ink)}
  .chip.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .chip .c{font-family:var(--mono);opacity:.7;margin-left:4px}
  .toolbar .sp{flex:1}
  .search,.sortsel{background:var(--panel-2);border:1px solid var(--line);color:var(--ink);font-family:inherit;font-size:13px;padding:9px 12px;border-radius:9px;outline:none}
  .search{min-width:200px}
  .search::placeholder{color:var(--ink-mut)}

  /* layout */
  .stage{display:grid;grid-template-columns:1fr;gap:0;padding:6px clamp(16px,3vw,28px) 60px}

  /* lead cards */
  .queue{display:flex;flex-direction:column;gap:10px}
  .lead{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;
    background:var(--panel);border:1px solid var(--line-2);border-radius:var(--r);padding:16px 18px;cursor:pointer;transition:border-color .2s,background .2s,transform .15s}
  .lead:hover{border-color:var(--line);background:var(--panel-2);transform:translateY(-1px)}
  .lead.sel{border-color:var(--green)}
  .score-ring{width:54px;height:54px;flex:none;position:relative}
  .score-ring svg{width:54px;height:54px;transform:rotate(-90deg)}
  .score-ring .bg{fill:none;stroke:var(--raise);stroke-width:4}
  .score-ring .fg{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
  .score-ring .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:14px;font-weight:600}
  .lead .mid{min-width:0}
  .lead .nm{font-size:16px;font-weight:600;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .lead .meta{font-size:12.5px;color:var(--ink-mut);margin-top:3px;display:flex;gap:8px 14px;flex-wrap:wrap;align-items:center}
  .lead .meta a{color:var(--blue);text-decoration:none}
  .lead .meta a:hover{text-decoration:underline}
  .tag{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:6px;white-space:nowrap}
  .tag.b{background:rgba(94,148,214,.14);color:var(--blue)}
  .hebel{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
  .hebel.hoch{color:var(--green)} .hebel.mittel{color:var(--amber)} .hebel.niedrig{color:var(--ink-mut)}
  .lead .right{display:flex;flex-direction:column;align-items:flex-end;gap:7px}
  .status{font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:20px;white-space:nowrap}
  .status.neu{background:rgba(94,148,214,.15);color:var(--blue)}
  .status.geprueft{background:rgba(224,169,59,.15);color:var(--amber)}
  .status.freigegeben{background:rgba(16,185,129,.16);color:var(--green)}
  .status.abgelehnt{background:rgba(232,118,92,.15);color:var(--red)}
  .stars{display:flex;gap:2px;color:var(--ink-mut);font-size:13px}
  .stars b{color:var(--amber);font-weight:400}

  /* detail drawer */
  .scrim{position:fixed;inset:0;z-index:40;background:rgba(5,6,9,.6);opacity:0;pointer-events:none;transition:opacity .3s}
  .scrim.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;bottom:0;z-index:41;width:min(560px,100vw);background:var(--bg-2);border-left:1px solid var(--line);
    transform:translateX(100%);transition:transform .35s cubic-bezier(.22,.61,.36,1);overflow-y:auto;display:flex;flex-direction:column}
  .drawer.open{transform:none}
  .dh{position:sticky;top:0;background:var(--bg-2);border-bottom:1px solid var(--line);padding:20px 22px;display:flex;align-items:flex-start;gap:14px;z-index:2}
  .dh .x{margin-left:auto;background:none;border:none;color:var(--ink-mut);font-size:24px;line-height:1;padding:2px 6px}
  .dh .x:hover{color:var(--ink)}
  .dh h2{margin:0;font-size:1.35rem;font-weight:600}
  .dh .sub{font-size:12.5px;color:var(--ink-mut);margin-top:4px;display:flex;gap:8px 12px;flex-wrap:wrap;align-items:center}
  .dh .sub a{color:var(--blue);text-decoration:none}
  .db{padding:22px;display:flex;flex-direction:column;gap:24px}
  .sec-t{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mut);margin:0 0 12px}
  /* score bars */
  .bars{display:flex;flex-direction:column;gap:10px}
  .bar{display:grid;grid-template-columns:96px 1fr 34px;gap:12px;align-items:center;font-size:13px}
  .bar .k{color:var(--ink-2)}
  .bar .track{height:7px;background:var(--raise);border-radius:5px;overflow:hidden}
  .bar .fill{height:100%;border-radius:5px;width:0;transition:width .6s ease}
  .bar .val{font-family:var(--mono);font-size:12px;text-align:right;color:var(--ink-2)}
  ul.findings{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  ul.findings li{display:flex;gap:10px;font-size:13.5px;color:var(--ink-2);line-height:1.45}
  ul.findings li::before{content:"";flex:none;width:7px;height:7px;border-radius:50%;margin-top:7px;background:var(--ink-mut)}
  ul.findings.prob li::before{background:var(--red)}
  ul.findings.opp li::before{background:var(--green)}
  /* review controls */
  .field{display:flex;flex-direction:column;gap:8px}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{flex:1;min-width:84px;font-size:12.5px;font-weight:600;color:var(--ink-2);background:var(--panel);border:1px solid var(--line);padding:9px 8px;border-radius:9px;transition:all .2s}
  .seg button.on[data-s="neu"]{background:rgba(94,148,214,.18);color:var(--blue);border-color:var(--blue)}
  .seg button.on[data-s="geprueft"]{background:rgba(224,169,59,.18);color:var(--amber);border-color:var(--amber)}
  .seg button.on[data-s="freigegeben"]{background:rgba(16,185,129,.2);color:var(--green);border-color:var(--green)}
  .seg button.on[data-s="abgelehnt"]{background:rgba(232,118,92,.18);color:var(--red);border-color:var(--red)}
  .rate{display:flex;gap:6px;font-size:26px;color:var(--raise)}
  .rate b{cursor:pointer;transition:color .15s;font-weight:400}
  .rate b.on,.rate b.hov{color:var(--amber)}
  textarea{background:var(--panel);border:1px solid var(--line);color:var(--ink);font-family:inherit;font-size:14px;padding:12px;border-radius:10px;resize:vertical;min-height:88px;outline:none}
  textarea:focus{border-color:var(--ink-mut)}
  input.txt{background:var(--panel);border:1px solid var(--line);color:var(--ink);font-family:inherit;font-size:14px;padding:11px 12px;border-radius:9px;outline:none;width:100%}
  input.txt:focus{border-color:var(--ink-mut)}
  .df{position:sticky;bottom:0;background:var(--bg-2);border-top:1px solid var(--line);padding:16px 22px;display:flex;gap:10px}
  .df .btn{flex:1;justify-content:center}
  .btn.danger{color:var(--red);border-color:rgba(232,118,92,.4)}
  .btn.danger:hover{background:rgba(232,118,92,.12)}
  .saved{font-size:12px;color:var(--green);align-self:center;opacity:0;transition:opacity .3s}
  .saved.show{opacity:1}

  /* modal */
  .modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(5,6,9,.7)}
  .modal.open{display:flex}
  .modal .box{background:var(--bg-2);border:1px solid var(--line);border-radius:16px;width:min(440px,100%);padding:24px;max-height:90vh;overflow:auto}
  .modal h3{margin:0 0 16px;font-size:1.2rem}
  .modal .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal label{font-size:12px;color:var(--ink-mut);margin:12px 0 5px;display:block}
  .modal .foot{display:flex;gap:10px;margin-top:20px}

  .empty{text-align:center;color:var(--ink-mut);padding:60px 20px;font-size:14px}

  @media (max-width:720px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .lead{grid-template-columns:auto 1fr;}
    .lead .right{grid-column:1 / -1;flex-direction:row;justify-content:space-between;align-items:center}
    .bar{grid-template-columns:80px 1fr 30px}
  }
</style>
</head>
<body>

<header class="top">
  <div class="brand">
    <span class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></span>
    <div>
      <div class="tt">MZ.9 · Audit Intelligence <span class="badge">System</span></div>
      <div class="sb">Continuous Website Audit &amp; Optimization Intelligence — kein Marketing-Tool</div>
    </div>
  </div>
  <div class="sp"></div>
  <div class="actions">
    <button class="btn" id="add"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Lead</button>
    <button class="btn" id="export"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Export</button>
    <button class="btn" id="reset"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8M3 3v5h5"/></svg>Reset</button>
  </div>
</header>

<section class="kpis" id="kpis"></section>

<div class="toolbar">
  <div class="chips" id="filters"></div>
  <div class="sp"></div>
  <input class="search" id="search" type="search" placeholder="Suche Firma / Branche …" aria-label="Suche">
  <select class="sortsel" id="sort" aria-label="Sortierung">
    <option value="hebel">Sortieren: Hebel</option>
    <option value="score">Audit-Score (niedrig → hoch)</option>
    <option value="scoreDesc">Audit-Score (hoch → niedrig)</option>
    <option value="name">Name A–Z</option>
    <option value="rating">Bewertung</option>
  </select>
</div>

<main class="stage">
  <div class="queue" id="queue"></div>
</main>

<!-- detail drawer -->
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-label="Lead-Details"></aside>

<!-- add modal -->
<div class="modal" id="modal">
  <div class="box">
    <h3>Lead manuell hinzufügen</h3>
    <label>Firmenname</label><input class="txt" id="m-name" placeholder="z. B. Praxis Müller">
    <div class="row2">
      <div><label>Branche</label><input class="txt" id="m-ind" placeholder="Physio"></div>
      <div><label>Ort</label><input class="txt" id="m-loc" placeholder="Bielefeld"></div>
    </div>
    <label>Website</label><input class="txt" id="m-url" placeholder="https://…">
    <div class="row2">
      <div><label>Audit-Score (0–100)</label><input class="txt mono" id="m-score" type="number" min="0" max="100" placeholder="40"></div>
      <div><label>Hebel</label>
        <select class="txt" id="m-hebel"><option value="hoch">hoch</option><option value="mittel">mittel</option><option value="niedrig">niedrig</option></select>
      </div>
    </div>
    <div class="foot">
      <button class="btn" id="m-cancel" style="flex:1;justify-content:center">Abbrechen</button>
      <button class="btn green" id="m-save" style="flex:1;justify-content:center">Hinzufügen</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var KEY="mz9_audit_queue_v1";
  var DIMS=[["design","Design"],["ux","UX"],["seo","SEO"],["conversion","Conversion"],["trust","Trust"],["performance","Performance"]];

  /* ---- seed: the 6 real businesses already discovered + audited ---- */
  var SEED=[
    {id:"physiofit",name:"Physiofit Bielefeld",industry:"Physiotherapie",location:"Bielefeld",
     website:"https://www.physio-fit-bielefeld.de/",hebel:"hoch",
     scores:{design:35,ux:30,seo:45,conversion:25,trust:20,performance:55},
     problems:["Veraltete Vorlage (~2015 Squarespace-Template)","Keine Online-Terminbuchung","Kein Kontaktformular / kein WhatsApp","Kein CTA above the fold (Telefon nur im Footer)","Keine Bewertungen / Trust-Signale sichtbar"],
     opps:["Online-Terminbuchung 24/7 (Conversion +40–60 %)","Google-Bewertungen prominent einbinden","WhatsApp- & Anruf-CTA above the fold","Team mit Fotos & Spezialisierungen"],
     status:"freigegeben",rating:5,notes:"Stärkster Demonstrator. Konzept-Vorschau bereits gebaut.",
     preview:"https://maikz91.github.io/the-tribe-bot/leads/physiofit/"},
    {id:"physiowell",name:"Physiowell Bielefeld",industry:"Physiotherapie",location:"Bielefeld",
     website:"https://www.physiowell-bielefeld.de/",hebel:"mittel",
     scores:{design:70,ux:60,seo:60,conversion:50,trust:30,performance:70},
     problems:["Keine Online-Buchung (alles über Formular)","Keine Bewertungen / Social Proof","Team ohne Fotos & Namen"],
     opps:["Echtzeit-Terminbuchung","Google-Reviews-Widget","Team-Sektion mit Credentials"],
     status:"neu",rating:0,notes:"",preview:""},
    {id:"spuerbar",name:"SpürbarAnders",industry:"Physiotherapie",location:"Bielefeld",
     website:"https://spuerbaranders.eu/",hebel:"niedrig",
     scores:{design:85,ux:80,seo:70,conversion:72,trust:55,performance:78},
     problems:["Telefon-CTA erst below the fold","Keine Google-Bewertungen sichtbar","Kein klassisches Kontaktformular"],
     opps:["Anruf-Button in den Hero","Reviews einbinden"],
     status:"neu",rating:0,notes:"Schon modern — geringer Hebel.",preview:""},
    {id:"kreuzkrug",name:"Restaurant Kreuzkrug",industry:"Gastronomie",location:"Bielefeld",
     website:"https://www.kreuzkrug.de/",hebel:"hoch",
     scores:{design:45,ux:50,seo:50,conversion:55,trust:25,performance:60},
     problems:["Veraltetes Design, kaum Bildwelt","Keine Bewertungen / kein Social Proof","Viele externe Weiterleitungen (Reservierung/Menü/Gutschein)"],
     opps:["Inline-Reservierung statt externer Redirects","Foto-Galerie (Speisen/Ambiente)","Google-Rating-Badge, 197 Jahre Historie inszenieren"],
     status:"neu",rating:0,notes:"",preview:""},
    {id:"strothmann",name:"Maler Strothmann",industry:"Handwerk",location:"Bielefeld",
     website:"https://www.maler-strothmann.de/",hebel:"mittel",
     scores:{design:75,ux:65,seo:60,conversion:45,trust:40,performance:70},
     problems:["Kein Kontakt-/Angebotsformular (nur Telefon)","Keine Kundenstimmen / Reviews","CTA-Hierarchie: „Jetzt bewerben“ dominiert vor Kundenanfrage"],
     opps:["Angebotsanfrage-Formular mit Foto-Upload","Referenz-Stories & Bewertungen","Klare „Angebot anfragen“-CTAs"],
     status:"neu",rating:0,notes:"",preview:""},
    {id:"schmitz",name:"Malermeister Schmitz",industry:"Handwerk",location:"Bielefeld",
     website:"https://maler-hans-schmitz.de/",hebel:"mittel",
     scores:{design:68,ux:62,seo:58,conversion:48,trust:50,performance:68},
     problems:["Kein Angebots-/Kontaktformular","Keine Kundenbewertungen","Leistungen ohne Umfang/Preis-Orientierung"],
     opps:["Lead-Capture-Formular","Reviews & Referenzen","Self-Qualify: Leistungspakete mit Richtwerten"],
     status:"neu",rating:0,notes:"",preview:""}
  ];

  function avg(s){var v=DIMS.map(function(d){return s[d[0]]||0;});return Math.round(v.reduce(function(a,b){return a+b;},0)/v.length);}
  function clone(o){return JSON.parse(JSON.stringify(o));}

  /* ---- state (seed merged with saved overrides) ---- */
  var state=load();
  function load(){
    try{var saved=JSON.parse(localStorage.getItem(KEY)); if(saved&&saved.length) return saved;}catch(e){}
    return clone(SEED);
  }
  function save(){ try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){} }

  var filter="alle", q="", sortBy="hebel", selId=null;

  var HEBEL_RANK={hoch:0,mittel:1,niedrig:2};
  var STATI=[["neu","Neu"],["geprueft","In Prüfung"],["freigegeben","Freigegeben"],["abgelehnt","Abgelehnt"]];

  function scoreColor(n){ return n<45?"#E8765C":n<65?"#E0A93B":"#10B981"; }

  /* ---- KPI render ---- */
  function renderKpis(){
    var total=state.length;
    var neu=state.filter(function(l){return l.status==="neu";}).length;
    var frei=state.filter(function(l){return l.status==="freigegeben";}).length;
    var hoch=state.filter(function(l){return l.hebel==="hoch";}).length;
    var sc=total?Math.round(state.reduce(function(a,l){return a+avg(l.scores);},0)/total):0;
    var k=[["Leads gesamt",total,""],["Neu / unbewertet",neu,""],["Freigegeben",frei,"accent"],["Ø Audit-Score",sc,""],["Hoher Hebel",hoch,""]];
    document.getElementById("kpis").innerHTML=k.map(function(x){
      return '<div class="kpi '+x[2]+'"><div class="v">'+x[1]+'</div><div class="l">'+x[0]+'</div></div>';
    }).join("");
  }

  /* ---- filters ---- */
  function renderFilters(){
    var defs=[["alle","Alle"]].concat(STATI);
    document.getElementById("filters").innerHTML=defs.map(function(d){
      var n=d[0]==="alle"?state.length:state.filter(function(l){return l.status===d[0];}).length;
      return '<button class="chip'+(filter===d[0]?" on":"")+'" data-f="'+d[0]+'">'+d[1]+'<span class="c">'+n+'</span></button>';
    }).join("");
  }

  /* ---- queue render ---- */
  function visible(){
    var list=state.filter(function(l){
      if(filter!=="alle"&&l.status!==filter) return false;
      if(q){var s=(l.name+" "+l.industry+" "+l.location).toLowerCase(); if(s.indexOf(q)<0) return false;}
      return true;
    });
    list.sort(function(a,b){
      if(sortBy==="name") return a.name.localeCompare(b.name);
      if(sortBy==="score") return avg(a.scores)-avg(b.scores);
      if(sortBy==="scoreDesc") return avg(b.scores)-avg(a.scores);
      if(sortBy==="rating") return (b.rating||0)-(a.rating||0);
      return (HEBEL_RANK[a.hebel]-HEBEL_RANK[b.hebel]) || (avg(a.scores)-avg(b.scores));
    });
    return list;
  }
  function ring(n){
    var c=2*Math.PI*16, off=c*(1-n/100);
    return '<div class="score-ring"><svg viewBox="0 0 40 40"><circle class="bg" cx="20" cy="20" r="16"/>'+
      '<circle class="fg" cx="20" cy="20" r="16" stroke="'+scoreColor(n)+'" stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"/></svg>'+
      '<span class="num">'+n+'</span></div>';
  }
  function starStr(r){var s="";for(var i=1;i<=5;i++){s+= i<=r?'<b>★</b>':'☆';}return s;}
  function renderQueue(){
    var list=visible(), el=document.getElementById("queue");
    if(!list.length){ el.innerHTML='<div class="empty">Keine Leads in dieser Ansicht.</div>'; return; }
    el.innerHTML=list.map(function(l){
      var sc=avg(l.scores), st=STATI.filter(function(x){return x[0]===l.status;})[0];
      var host=l.website.replace(/^https?:\/\//,"").replace(/\/$/,"");
      return '<div class="lead'+(l.id===selId?" sel":"")+'" data-id="'+l.id+'">'+
        ring(sc)+
        '<div class="mid"><div class="nm">'+esc(l.name)+' <span class="tag b">'+esc(l.industry)+'</span></div>'+
          '<div class="meta"><span>'+esc(l.location)+'</span><a href="'+l.website+'" target="_blank" rel="noopener" data-stop>'+esc(host)+' ↗</a>'+
          '<span class="hebel '+l.hebel+'">▲ Hebel '+l.hebel+'</span>'+(l.preview?'<span class="tag b">Vorschau ✓</span>':"")+'</div></div>'+
        '<div class="right"><span class="status '+l.status+'">'+st[1]+'</span><span class="stars">'+starStr(l.rating||0)+'</span></div>'+
      '</div>';
    }).join("");
  }
  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]);});}

  /* ---- detail drawer ---- */
  function openDrawer(id){
    selId=id; var l=state.filter(function(x){return x.id===id;})[0]; if(!l) return;
    var sc=avg(l.scores), host=l.website.replace(/^https?:\/\//,"").replace(/\/$/,"");
    var bars=DIMS.map(function(d){var v=l.scores[d[0]]||0;
      return '<div class="bar"><span class="k">'+d[1]+'</span><span class="track"><span class="fill" style="background:'+scoreColor(v)+'" data-w="'+v+'"></span></span><span class="val">'+v+'</span></div>';
    }).join("");
    var d=document.getElementById("drawer");
    d.innerHTML=
      '<div class="dh"><div><h2>'+esc(l.name)+'</h2><div class="sub"><span>'+esc(l.industry)+' · '+esc(l.location)+'</span>'+
        '<a href="'+l.website+'" target="_blank" rel="noopener">'+esc(host)+' ↗</a><span class="hebel '+l.hebel+'">▲ '+l.hebel+'</span></div></div>'+
        '<button class="x" id="dclose" aria-label="Schließen">×</button></div>'+
      '<div class="db">'+
        '<div><p class="sec-t">Audit-Score · '+sc+'/100</p><div class="bars">'+bars+'</div></div>'+
        '<div><p class="sec-t">Schwachstellen</p><ul class="findings prob">'+l.problems.map(function(p){return "<li>"+esc(p)+"</li>";}).join("")+'</ul></div>'+
        '<div><p class="sec-t">Optimierungspotenzial</p><ul class="findings opp">'+l.opps.map(function(p){return "<li>"+esc(p)+"</li>";}).join("")+'</ul></div>'+
        '<div class="field"><p class="sec-t">Status</p><div class="seg" id="seg">'+
          STATI.map(function(s){return '<button data-s="'+s[0]+'" class="'+(l.status===s[0]?"on":"")+'">'+s[1]+'</button>';}).join("")+'</div></div>'+
        '<div class="field"><p class="sec-t">Manuelle Bewertung</p><div class="rate" id="rate">'+
          [1,2,3,4,5].map(function(i){return '<b data-r="'+i+'" class="'+(i<=(l.rating||0)?"on":"")+'">★</b>';}).join("")+'</div></div>'+
        '<div class="field"><p class="sec-t">Konzept-Vorschau (URL)</p><input class="txt mono" id="prev" placeholder="https://… (optional)" value="'+esc(l.preview||"")+'"></div>'+
        '<div class="field"><p class="sec-t">Notizen</p><textarea id="notes" placeholder="Interne Notiz zur Bewertung …">'+esc(l.notes||"")+'</textarea></div>'+
      '</div>'+
      '<div class="df"><button class="btn danger" id="del">Löschen</button><span class="saved" id="saved">✓ gespeichert</span><button class="btn green" id="dsave" style="flex:1;justify-content:center">Speichern</button></div>';
    document.getElementById("scrim").classList.add("open");
    d.classList.add("open");
    requestAnimationFrame(function(){ d.querySelectorAll(".fill").forEach(function(f){f.style.width=f.getAttribute("data-w")+"%";}); });
    wireDrawer(l);
    renderQueue();
  }
  function closeDrawer(){ selId=null; document.getElementById("scrim").classList.remove("open"); document.getElementById("drawer").classList.remove("open"); renderQueue(); }

  function wireDrawer(l){
    var pend={status:l.status, rating:l.rating||0};
    document.getElementById("dclose").onclick=closeDrawer;
    document.getElementById("seg").querySelectorAll("button").forEach(function(b){
      b.onclick=function(){ pend.status=b.getAttribute("data-s");
        document.querySelectorAll("#seg button").forEach(function(x){x.classList.toggle("on",x===b);}); };
    });
    var rate=document.getElementById("rate");
    rate.querySelectorAll("b").forEach(function(b){
      var r=+b.getAttribute("data-r");
      b.onmouseenter=function(){ rate.querySelectorAll("b").forEach(function(x){x.classList.toggle("hov",+x.getAttribute("data-r")<=r);}); };
      b.onclick=function(){ pend.rating=(pend.rating===r?0:r); paintRate(); };
    });
    rate.onmouseleave=function(){ rate.querySelectorAll("b").forEach(function(x){x.classList.remove("hov");}); };
    function paintRate(){ rate.querySelectorAll("b").forEach(function(x){x.classList.toggle("on",+x.getAttribute("data-r")<=pend.rating);}); }
    document.getElementById("dsave").onclick=function(){
      l.status=pend.status; l.rating=pend.rating;
      l.preview=document.getElementById("prev").value.trim();
      l.notes=document.getElementById("notes").value;
      save(); renderKpis(); renderFilters(); renderQueue();
      var s=document.getElementById("saved"); s.classList.add("show"); setTimeout(function(){s.classList.remove("show");},1400);
    };
    document.getElementById("del").onclick=function(){
      if(!confirm("Lead \""+l.name+"\" wirklich aus der Queue entfernen?")) return;
      state=state.filter(function(x){return x.id!==l.id;}); save(); closeDrawer(); renderAll();
    };
  }

  /* ---- events ---- */
  document.getElementById("queue").addEventListener("click",function(e){
    if(e.target.closest("[data-stop]")) return; // let website link open
    var row=e.target.closest(".lead"); if(row) openDrawer(row.getAttribute("data-id"));
  });
  document.getElementById("scrim").addEventListener("click",closeDrawer);
  document.addEventListener("keydown",function(e){ if(e.key==="Escape") closeDrawer(); });
  document.getElementById("filters").addEventListener("click",function(e){
    var b=e.target.closest("[data-f]"); if(!b) return; filter=b.getAttribute("data-f"); renderFilters(); renderQueue();
  });
  document.getElementById("search").addEventListener("input",function(e){ q=e.target.value.trim().toLowerCase(); renderQueue(); });
  document.getElementById("sort").addEventListener("change",function(e){ sortBy=e.target.value; renderQueue(); });

  /* export CSV+JSON */
  document.getElementById("export").onclick=function(){
    var rows=[["Firma","Branche","Ort","Website","Audit-Score","Hebel","Status","Bewertung","Vorschau","Notizen"]];
    state.forEach(function(l){ rows.push([l.name,l.industry,l.location,l.website,avg(l.scores),l.hebel,l.status,l.rating||0,l.preview||"",(l.notes||"").replace(/\n/g," ")]); });
    var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
    dl("audit-queue.csv","text/csv",csv);
    dl("audit-queue.json","application/json",JSON.stringify(state,null,2));
  };
  function dl(name,type,data){var b=new Blob([data],{type:type}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download=name;a.click();setTimeout(function(){URL.revokeObjectURL(u);},500);}

  /* reset */
  document.getElementById("reset").onclick=function(){ if(confirm("Queue auf die 6 Start-Leads zurücksetzen? Deine Bewertungen gehen verloren.")){ state=clone(SEED); save(); closeDrawer(); renderAll(); } };

  /* add modal */
  var modal=document.getElementById("modal");
  document.getElementById("add").onclick=function(){ modal.classList.add("open"); document.getElementById("m-name").focus(); };
  document.getElementById("m-cancel").onclick=function(){ modal.classList.remove("open"); };
  modal.addEventListener("click",function(e){ if(e.target===modal) modal.classList.remove("open"); });
  document.getElementById("m-save").onclick=function(){
    var name=document.getElementById("m-name").value.trim(); if(!name){ document.getElementById("m-name").focus(); return; }
    var sc=Math.max(0,Math.min(100,+document.getElementById("m-score").value||40));
    var id=name.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"")+"-"+Math.random().toString(36).slice(2,6);
    state.unshift({id:id,name:name,industry:document.getElementById("m-ind").value.trim()||"—",location:document.getElementById("m-loc").value.trim()||"—",
      website:document.getElementById("m-url").value.trim()||"#",hebel:document.getElementById("m-hebel").value,
      scores:{design:sc,ux:sc,seo:sc,conversion:sc,trust:sc,performance:sc},
      problems:["Manuell angelegt — Audit ausstehend"],opps:["Audit durchführen"],status:"neu",rating:0,notes:"",preview:""});
    save(); modal.classList.remove("open");
    ["m-name","m-ind","m-loc","m-url","m-score"].forEach(function(i){document.getElementById(i).value="";});
    renderAll();
  };

  function renderAll(){ renderKpis(); renderFilters(); renderQueue(); }
  renderAll();
})();
</script>
</body>
</html>
