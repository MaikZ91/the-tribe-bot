<style>
  :root{
    --bg:#0E1116; --panel:#161B22; --panel-2:#1C232C; --card:#171D25;
    --ink:#E8ECF1; --ink-2:#9BA6B2; --ink-mut:#677083;
    --accent:#5E94D6; --green:#10B981; --amber:#E0A93B; --red:#E8765C;
    --line:rgba(232,236,241,.10); --line-2:rgba(232,236,241,.06);
    --maxw:1000px; --r:12px; --ease:cubic-bezier(.22,.61,.36,1);
    --sans:"Inter",system-ui,sans-serif; --mono:ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 clamp(14px,4vw,24px)}
  .top{padding:16px 0 2px}
  .top h1{font-size:clamp(1.4rem,3.5vw,1.85rem);font-weight:800;margin:0;letter-spacing:-.02em}
  .top p{margin:6px 0 0;color:var(--ink-2);font-size:14px}
  .top .meta{margin-top:12px;font-size:12.5px;color:var(--ink-mut);display:flex;gap:16px;flex-wrap:wrap}
  .top .meta b{color:var(--accent)}

  /* list view — kompakt */
  .list{padding:12px 0 80px;display:flex;flex-direction:column;gap:5px}
  .row{background:var(--card);border:1px solid var(--line-2);border-radius:10px;padding:8px 10px;display:flex;align-items:center;gap:10px;transition:border-color .2s}
  .row:hover{border-color:var(--line)}
  .row .info{flex:1;min-width:0}
  .row .nm{font-size:.95rem;font-weight:700;line-height:1.15;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .heb{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:5px;white-space:nowrap}
  .heb.hoch{background:rgba(16,185,129,.16);color:var(--green)} .heb.mittel{background:rgba(224,169,59,.16);color:var(--amber)} .heb.niedrig{background:rgba(103,112,131,.18);color:var(--ink-mut)}
  .row .sub{margin-top:2px;font-size:11.5px;color:var(--ink-mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .score{flex:none;display:flex;flex-direction:column;align-items:center;justify-content:center;width:38px;height:38px;border-radius:9px;background:var(--panel-2);border:1px solid var(--line-2)}
  .score b{font-size:.92rem;font-weight:800;line-height:1} .score span{font-size:7.5px;color:var(--ink-mut);text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
  .score.lo b{color:var(--red)} .score.mid b{color:var(--amber)} .score.hi b{color:var(--green)}
  .row .acts{display:flex;gap:6px;flex:none}
  .rm{flex:none;background:transparent;border:1px solid var(--line);color:var(--ink-mut);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:15px;line-height:1;transition:.2s}
  .rm:hover{border-color:var(--red);color:var(--red)}
  .restore{color:var(--accent);cursor:pointer;text-decoration:underline}
  .det{display:none;grid-column:1/-1;width:100%;margin-top:4px;padding-top:14px;border-top:1px solid var(--line-2);gap:20px;grid-template-columns:1fr 1fr}
  .det.open{display:grid}
  .det h4{margin:0 0 8px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-mut)}
  .det ul{margin:0;padding:0;display:grid;gap:6px} .det li{list-style:none;display:flex;gap:8px;align-items:flex-start;font-size:13px;color:var(--ink-2)}
  .det.problems li::before{content:"–";color:var(--red);flex:none} .det.opps li::before{content:"+";color:var(--green);flex:none;font-weight:700}
  .det .col.p li::before{content:"–";color:var(--red);flex:none} .det .col.o li::before{content:"+";color:var(--green);font-weight:700;flex:none}
  .row.exp{flex-wrap:wrap}
  .toggle{flex:none;background:transparent;border:1px solid var(--line);color:var(--ink-mut);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:13px;transition:border-color .2s,color .2s}
  .toggle:hover{border-color:var(--accent);color:var(--accent)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;font-weight:700;font-size:12px;padding:7px 11px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:transform .15s,background .2s,border-color .2s;white-space:nowrap}
  .btn:hover{transform:translateY(-1px)} .btn svg{width:14px;height:14px;flex:none}
  .btn-pri{background:var(--accent);color:#fff} .btn-pri:hover{background:#4d83c5}
  .btn-sec{background:transparent;border-color:var(--line);color:var(--ink-2)} .btn-sec:hover{border-color:var(--accent);color:var(--accent)}
  .ghost{text-align:center;color:var(--ink-mut);font-size:12.5px;padding:14px 6px}
  @media (max-width:640px){
    .row{flex-wrap:wrap} .row .acts{width:100%;justify-content:flex-start} .btn{flex:1}
    .lbl{display:none}
  }

  /* split-view overlay */
  .split{position:fixed;inset:0;z-index:500;background:var(--bg);display:none;flex-direction:column}
  .split.open{display:flex}
  .split .bar{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:nowrap}
  .split .bar .ttl{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0} .split .bar .ttl small{color:var(--ink-mut);font-weight:500;margin-left:6px;font-size:11px}
  .split .bar .sp{flex:1;min-width:4px}
  .split .bar button{font-family:inherit;font-weight:600;font-size:12px;padding:6px 11px;border-radius:7px;border:1px solid var(--line);background:transparent;color:var(--ink);cursor:pointer;white-space:nowrap;flex:none}
  .split .bar button.x{background:var(--accent);color:#fff;border-color:transparent}
  .split .bar button:hover{border-color:var(--accent)}
  .panes{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0}
  .pane{display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--line)}
  .pane:last-child{border-right:0}
  .pane .lab{font-size:11.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:6px 12px;background:var(--panel-2);color:var(--amber);display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--amber)}
  .pane .lab::before{content:"";display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--amber);margin-right:7px;vertical-align:-1px}
  .pane .lab.neu{color:var(--green);border-bottom-color:var(--green)} .pane .lab.neu::before{background:var(--green)}
  .pane .lab a{color:var(--accent);font-size:11px;text-transform:none;letter-spacing:0;font-weight:700;margin-left:auto}
  .pane .lab a.liveopen{background:var(--accent);color:#fff;padding:4px 10px;border-radius:6px;font-weight:700}
  .pane .fr{flex:1;position:relative;background:#fff;min-height:0;overflow:auto}
  .pane iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#fff}
  .hint{position:absolute;left:0;right:0;bottom:0;z-index:3;background:rgba(22,27,34,.94);color:var(--ink-2);font-size:12px;text-align:center;padding:9px 12px}
  .hint a{color:var(--accent);font-weight:700}
  /* alt = scrollbarer Vollseiten-Screenshot (iframe-Einbettung der Fremdseite wird i.d.R. geblockt) */
  .shot{width:100%;display:block}
  .shotwrap{position:relative;min-height:100%}
  .loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--ink-mut);background:var(--panel);font-size:13px}
  .loading .sp{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .seg{display:none;gap:0;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{padding:7px 18px;font-size:13px;font-weight:800;background:transparent;color:var(--ink-2);border:0;cursor:pointer;text-transform:uppercase;letter-spacing:.04em}
  .seg button[data-pane="alt"].on{background:var(--amber);color:#1a1206}
  .seg button[data-pane="neu"].on{background:var(--green);color:#062a1d}
  @media (max-width:760px){
    .panes{grid-template-columns:1fr;grid-template-rows:1fr}
    .pane{border-right:0;border-bottom:1px solid var(--line);display:none}
    .pane.show{display:flex}
    /* großer, vollbreiter Alt/Neu-Umschalter in eigener Zeile */
    .split .bar{flex-wrap:wrap;gap:6px;padding:7px 8px}
    .split .bar .ttl{display:none}
    .seg{display:flex;flex:1 1 100%;order:-1;border-radius:9px}
    .seg button{flex:1;padding:12px 0;font-size:14px}
    .split .bar .sp{flex:1}
  }
</style>
</head>

  </div>
</div>

  var built=SEED.filter(function(l){return l.preview;});

  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]);});}

  /* ---- fertige E-Mail (mailto) ---- */

    var to=EMAILS[l.id]||("info@"+domain);
    var subject=(l.noweb?"Ihre eigene Website — Konzept-Vorschau für ":"Konzept-Vorschau für Ihre Website — ")+l.name;

      body=

"Ich habe mir unverbindlich die Freiheit genommen, schon mal eine komplette Website für euch zu gestalten — schaut gern rein:\n\n"+
l.preview+"\n\n"+

l.opps.map(function(o){return "• "+o;}).join("\n")+"\n\n"+

"Über eine kurze Rückmeldung würde ich mich sehr freuen.\n\n"+
"Herzliche Grüße\nMaik\nMZ.9 — Media Engineering.AI\n";
    } else {
      body=
"Hallo liebes "+l.name+"-Team,\n\n"+
"mein Name ist Maik, ich komme aus Bielefeld — und ehrlich gesagt mag ich, was Sie machen. Genau deshalb ist mir Ihre Website aufgefallen: Sie hat richtig Potenzial, kommt online aber noch nicht so rüber, wie Sie es vor Ort tun.\n\n"+
"Ich habe mir völlig unverbindlich die Freiheit genommen und eine moderne Vorschau gestaltet, wie Ihr Auftritt aussehen könnte — schauen Sie gern rein:\n\n"+
l.preview+"\n\n"+
"Im Vergleich zur aktuellen Seite ("+host(l.website)+") fällt mir vor allem auf, was sich mit wenig Aufwand spürbar verbessern lässt:\n"+
l.opps.map(function(o){return "• "+o;}).join("\n")+"\n\n"+

    return "mailto:"+encodeURIComponent(to)+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);

  function sendMail(l){ window.location.href=mailFor(l); }

  /* ---- split view: beide live als iframe (schnell, volle Seite); alte Seite ggf. per Tab ---- */
  var split=document.getElementById("split"), curId=null;
  function openSplit(l){
    curId=l.id;
    document.getElementById("splitTtl").innerHTML=esc(l.name)+' <small>'+esc(l.industry)+' · '+esc(host(l.website))+'</small>';
    document.getElementById("altLink").href=l.website;
    document.getElementById("altHintLink").href=l.website;
    document.getElementById("neuLink").href=l.preview;
    document.getElementById("neuFrame").src=l.preview;
    document.getElementById("altFrame").src=l.website;
    split.classList.add("open"); document.body.style.overflow="hidden"; setPane("alt");
  }
  function closeSplit(){ split.classList.remove("open"); document.body.style.overflow="";
    document.getElementById("neuFrame").src="about:blank"; document.getElementById("altFrame").src="about:blank"; curId=null; }
  function setPane(p){
    document.querySelectorAll(".pane").forEach(function(el){el.classList.toggle("show",el.getAttribute("data-pane")===p);});
    document.querySelectorAll("#seg button").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-pane")===p);});
  }
  document.getElementById("splitClose").onclick=closeSplit;
  document.getElementById("splitMail").onclick=function(){ if(curId) sendMail(byId(curId)); };
  document.getElementById("seg").addEventListener("click",function(e){var b=e.target.closest("[data-pane]");if(b)setPane(b.getAttribute("data-pane"));});
  document.addEventListener("keydown",function(e){ if(e.key==="Escape" && split.classList.contains("open")) closeSplit(); });

  /* ---- entfernte Leads (localStorage) ---- */
  var HKEY="mz9_audit_hidden_v1";
  function loadHidden(){ try{var h=JSON.parse(localStorage.getItem(HKEY)); return Array.isArray(h)?h:[];}catch(e){return [];} }
  function saveHidden(h){ try{localStorage.setItem(HKEY,JSON.stringify(h));}catch(e){} }
  var hidden=loadHidden();
  function isHidden(id){ return hidden.indexOf(id)>=0; }
  function hide(id){ if(!isHidden(id)){ hidden.push(id); saveHidden(hidden); render(); } }
  function restoreAll(){ hidden=[]; saveHidden(hidden); render(); }

  /* ---- render: Listen-Ansicht ---- */
  function scoreCls(n){ return n<45?"lo":n<65?"mid":"hi"; }
  var list=document.getElementById("list");
  function render(){
    var vis=built.filter(function(l){return !isHidden(l.id);});
    document.getElementById("meta").innerHTML=
      '<span><b>'+vis.length+'</b> in Liste</span><span><b>'+built.length+'</b> Vorschauen gesamt</span>'+
      (hidden.length?'<span><span class="restore" id="restore">'+hidden.length+' ausgeblendet — zurückholen</span></span>':'');
    list.innerHTML=vis.map(function(l){
      var probs=(l.problems||[]).map(function(p){return '<li>'+esc(p)+'</li>';}).join("");
      var opps=(l.opps||[]).map(function(o){return '<li>'+esc(o)+'</li>';}).join("");
      return '<div class="row" data-id="'+l.id+'">'+
        '<div class="score '+scoreCls(l.score||0)+'" title="Audit-Score (0–100, niedriger = mehr Hebel)"><b>'+(l.score||0)+'</b><span>Score</span></div>'+
        '<div class="info"><div class="nm">'+esc(l.name)+'<span class="heb '+l.hebel+'">'+l.hebel+'</span></div>'+
          '<div class="sub">'+esc(l.industry)+' · '+(l.noweb?'⚠ noch keine eigene Website':esc(host(l.website)))+'</div></div>'+
        '<button class="toggle" data-act="toggle" title="Bewertung / Schwachstellen">▾</button>'+
        '<div class="acts">'+
          '<button class="btn btn-pri" data-act="split"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="8" height="16" rx="1"/><rect x="13" y="4" width="8" height="16" rx="1"/></svg><span class="lbl">Alt ↔ Neu</span></button>'+
          '<button class="btn btn-sec" data-act="open" title="Neue Vorschau öffnen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg><span class="lbl">Vorschau</span></button>'+
          '<button class="btn btn-sec" data-act="mail" title="Fertige E-Mail öffnen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg><span class="lbl">E-Mail</span></button>'+
        '</div>'+
        '<button class="rm" data-act="remove" title="Aus Liste entfernen">×</button>'+
        '<div class="det"><div class="col p"><h4>Schwachstellen aktuell</h4><ul>'+probs+'</ul></div>'+
          '<div class="col o"><h4>Was die neue Vorschau verbessert</h4><ul>'+opps+'</ul></div></div>'+
      '</div>';
    }).join("");
    if(!vis.length) list.innerHTML='<div class="ghost">Keine Vorschauen in der Liste.'+(hidden.length?' <span class="restore" id="restore2">Ausgeblendete zurückholen</span>':'')+'</div>';
    var r1=document.getElementById("restore"), r2=document.getElementById("restore2");
    if(r1) r1.onclick=restoreAll; if(r2) r2.onclick=restoreAll;
  }
  render();

  list.addEventListener("click",function(e){
    var b=e.target.closest("[data-act]"); if(!b) return;
    var row=b.closest(".row"); var l=byId(row.getAttribute("data-id")); if(!l) return;
    var a=b.getAttribute("data-act");
    if(a==="remove"){ hide(l.id); return; }
    if(a==="toggle"){ var det=row.querySelector(".det");
      var on=det.classList.toggle("open"); row.classList.toggle("exp",on); b.textContent=on?"▴":"▾"; return; }
    if(a==="split") openSplit(l);
    else if(a==="open") window.open(l.preview,"_blank","noopener");
    else if(a==="mail") sendMail(l);
  });
})();
