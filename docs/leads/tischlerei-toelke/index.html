<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--walnut:#1a1410;--oak:#d4a574;--cream:#f5ede3;--gold:#8b6914;--walnut-light:#2a2218;--oak-dark:#b8895a;--gold-light:#a67c1e;--text-light:rgba(245,237,227,0.85);--text-muted:rgba(245,237,227,0.6);--radius:4px;--transition:0.3s ease}
