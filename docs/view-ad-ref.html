<!DOCTYPE html>
<html>
<head><title>Ad Reference</title></head>
<body style="margin:0;padding:20px;background:#1e1e2e;">
<script>
fetch('ad-reference-original.png').then(r=>r.blob()).then(b=>{
  const reader = new FileReader();
  reader.onload = () => {
    document.body.innerHTML = `<img src="${reader.result}" style="max-width:100%;">`;
  };
  reader.readAsDataURL(b);
});
</script>
</body>
</html>
